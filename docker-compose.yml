version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: redis-queue
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  worker:
    build: .
    container_name: celery-worker
    command: celery -A worker.celery_app worker --loglevel=info -Q high,default,low --concurrency=4
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379

  dashboard:
    build: .
    container_name: task-dashboard
    command: python -m dashboard.app
    ports:
      - "5001:5001"
    depends_on:
      - worker
    environment:
      - REDIS_URL=redis://redis:6379